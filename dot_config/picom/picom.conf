# Backend
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# Opacity — all disabled for performance
active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 1.0;

# Fading — disabled for performance
fading = false;

# Corners
corner-radius = 6;

# Shadows
shadow = true;
shadow-radius = 8;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.4;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'Polybar'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# Misc
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

# Window type settings
wintypes:
{
    dock = { shadow = false; };
    dnd = { shadow = false; };
    tooltip = { shadow = true; };
};
