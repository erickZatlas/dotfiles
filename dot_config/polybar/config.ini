[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
primary = #7aa2f7
secondary = #7dcfff
alert = #f7768e
disabled = #565f89
good = #9ece6a
warning = #e0af68
magenta = #bb9af7
cyan = #7dcfff

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 32
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 0

padding-left = 2
padding-right = 2

module-margin-left = 0
module-margin-right = 0

font-0 = FiraCode Nerd Font:size=10;3
font-1 = FiraCode Nerd Font:size=14;4
font-2 = FiraCode Nerd Font:size=10;3

modules-left = i3
modules-center = date
modules-right = xkeyboard sep wireless ethernet sep battery sep cpu memory sep pulseaudio sep filesystem

separator =

tray-position = right
tray-padding = 4

cursor-click = pointer

wm-restack = i3

[module/sep]
type = custom/text
content = " "

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true

label-focused = %index%
label-focused-background = ${colors.primary}
label-focused-foreground = ${colors.background}
label-focused-underline = ${colors.cyan}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-visible-background = ${colors.background-alt}
label-visible-underline = ${colors.disabled}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

[module/xkeyboard]
type = internal/xkeyboard
format = <label-layout>
format-prefix = " "
format-prefix-foreground = ${colors.magenta}
label-layout = %layout%
label-layout-foreground = ${colors.magenta}
label-layout-padding = 1

[module/wireless]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <label-connected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.good}
label-connected = %essid% %signal%%
label-connected-padding-right = 1
format-disconnected = <label-disconnected>
format-disconnected-prefix = " "
format-disconnected-prefix-foreground = ${colors.alert}
label-disconnected = down
label-disconnected-foreground = ${colors.alert}

[module/ethernet]
type = internal/network
interface-type = wired
interval = 5
format-connected = <label-connected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.good}
label-connected = %local_ip%
format-disconnected =

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ADP1

format-charging = <label-charging>
format-charging-prefix = " "
format-charging-prefix-foreground = ${colors.good}
label-charging = %percentage%%
label-charging-padding-right = 1

format-discharging = <label-discharging>
format-discharging-prefix = " "
format-discharging-prefix-foreground = ${colors.warning}
label-discharging = %percentage%%
label-discharging-padding-right = 1

format-full = <label-full>
format-full-prefix = " "
format-full-prefix-foreground = ${colors.good}
label-full = %percentage%%
label-full-padding-right = 1

format-low = <label-low>
format-low-prefix = " "
format-low-prefix-foreground = ${colors.alert}
label-low = %percentage%%
label-low-foreground = ${colors.alert}
label-low-padding-right = 1

[module/cpu]
type = internal/cpu
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.secondary}
label = %percentage%%
label-padding-right = 1

[module/memory]
type = internal/memory
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.secondary}
label = %used%
label-padding-right = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.cyan}
label-volume = %percentage%%
label-volume-padding-right = 1
label-muted = " muted"
label-muted-foreground = ${colors.disabled}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.warning}
label-mounted = %free%
label-mounted-padding-right = 1

[module/date]
type = internal/date
interval = 60
date = %a %d %b
time = %H:%M
label = %date%   %time%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
