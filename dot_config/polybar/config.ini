[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
primary = #7aa2f7
secondary = #7dcfff
alert = #f7768e
disabled = #565f89
good = #9ece6a
warning = #e0af68
magenta = #bb9af7
cyan = #7dcfff

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 32
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 0

padding-left = 2
padding-right = 2

module-margin-left = 0
module-margin-right = 0

font-0 = FiraCode Nerd Font:style=Regular:size=10;3
font-1 = FiraCode Nerd Font Mono:style=Regular:size=14;4
font-2 = FiraCode Nerd Font:style=Regular:size=10;3

modules-left = i3 sep layout
modules-center = date
modules-right = xkeyboard sep awsvpn sep wireless ethernet sep battery sep cpu memory sep pulseaudio sep filesystem

separator =

tray-position = right
tray-padding = 4

cursor-click = pointer

wm-restack = i3

[module/sep]
type = custom/text
content = " "

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true

label-focused = %index%
label-focused-background = ${colors.primary}
label-focused-foreground = ${colors.background}
label-focused-underline = ${colors.cyan}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-visible-background = ${colors.background-alt}
label-visible-underline = ${colors.disabled}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

[module/layout]
type = custom/script
exec = ~/.config/polybar/layout.sh
interval = 1

label-foreground = ${colors.warning}
label-padding-left = 1

[module/xkeyboard]
type = internal/xkeyboard
format = <label-layout>

format-prefix =  
format-prefix-foreground = ${colors.magenta}
label-layout = %layout%
label-layout-foreground = ${colors.magenta}
label-layout-padding = 1

[module/wireless]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <label-connected>
format-connected-prefix =  
format-connected-prefix-foreground = ${colors.good}
label-connected = %{O8}%signal%%
label-connected-padding-right = 1
format-disconnected = <label-disconnected>
format-disconnected-prefix =  
format-disconnected-prefix-foreground = ${colors.alert}
label-disconnected = down
label-disconnected-foreground = ${colors.alert}

[module/ethernet]
type = internal/network
interface-type = wired
interval = 5
format-connected = <label-connected>
format-connected-prefix =  
format-connected-prefix-foreground = ${colors.good}
label-connected = %local_ip%
format-disconnected =

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ADP1

format-charging = <ramp-capacity> <label-charging>
label-charging =  %percentage%%
label-charging-foreground = ${colors.good}
label-charging-padding-right = 1

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %{O8}%percentage%%
label-discharging-padding-right = 1

format-full = <label-full>
format-full-prefix =  
format-full-prefix-foreground = ${colors.good}
label-full = %{O8}%percentage%%
label-full-padding-right = 1

format-low = <ramp-capacity> <label-low>
label-low = %{O8}%percentage%%
label-low-foreground = ${colors.alert}
label-low-padding-right = 1

ramp-capacity-0 = 
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = 
ramp-capacity-1-foreground = ${colors.alert}
ramp-capacity-2 = 
ramp-capacity-2-foreground = ${colors.warning}
ramp-capacity-3 = 
ramp-capacity-3-foreground = ${colors.warning}
ramp-capacity-4 = 
ramp-capacity-4-foreground = ${colors.good}

[module/cpu]
type = internal/cpu
interval = 5

format-prefix =  
format-prefix-foreground = ${colors.secondary}
label = %{O8}%percentage%%
label-padding-right = 1

[module/memory]
type = internal/memory
interval = 5

format-prefix =  
format-prefix-foreground = ${colors.secondary}
label = %{O8}%used%
label-padding-right = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix =  
format-volume-prefix-foreground = ${colors.cyan}
label-volume = %{O8}%percentage%%
label-volume-padding-right = 1
label-muted =  muted
label-muted-foreground = ${colors.disabled}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
format-mounted-prefix =  
format-mounted-prefix-foreground = ${colors.warning}
label-mounted = %{O8}%free%
label-mounted-padding-right = 1

[module/date]
type = internal/date
interval = 60
date = %a %d %b
time = %H:%M
label =  %date%   %time%
label-foreground = ${colors.foreground}

[module/awsvpn]
type = custom/script
exec = ~/.config/polybar/scripts/awsvpn-status.sh
interval = 5
click-left = ~/.config/i3/awsvpn-toggle.sh
label-padding = 1

[settings]
screenchange-reload = true
