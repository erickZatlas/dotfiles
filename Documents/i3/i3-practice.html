<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i3wm — Interactive Practice</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'FiraCode Nerd Font', 'Fira Code', Consolas, monospace;
  background: #1a1b26;
  color: #c0caf5;
  font-size: 14px;
}

.app {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #16161e;
  border-right: 1px solid #2f3549;
  padding: 16px;
  overflow-y: auto;
  flex-shrink: 0;
  transition: margin-left 0.2s ease;
}

.sidebar.collapsed {
  margin-left: -260px;
}

.sidebar h1 { color: #7aa2f7; font-size: 18px; margin-bottom: 4px; }
.sidebar .subtitle { color: #565f89; font-size: 11px; margin-bottom: 16px; display: block; }

.sidebar-toggle {
  position: fixed;
  left: 8px;
  top: 8px;
  z-index: 100;
  background: #24283b;
  border: 1px solid #2f3549;
  color: #7aa2f7;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: left 0.2s ease;
}

.sidebar-toggle.shifted { left: 268px; }
.sidebar-toggle:hover { background: #2f3549; }

/* Main content */
.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

h1 { color: #7aa2f7; font-size: 22px; margin-bottom: 4px; }
.subtitle { color: #565f89; font-size: 12px; margin-bottom: 24px; }

/* Layout */
.main {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}

/* Tree panel */
.tree-panel {
  background: #24283b;
  border-radius: 10px;
  padding: 20px;
  border: 1px solid #2f3549;
  min-height: 400px;
}

.tree-panel h2 { color: #7aa2f7; font-size: 14px; margin-bottom: 12px; }

#tree-view {
  font-size: 13px;
  line-height: 1.6;
  white-space: pre;
  overflow-x: auto;
}

#tree-view .node-ws { color: #bb9af7; }
#tree-view .node-layout { color: #7aa2f7; }
#tree-view .node-window { color: #9ece6a; }
#tree-view .node-focused { color: #f7768e; font-weight: bold; }
#tree-view .node-branch { color: #414868; }

/* Screen preview */
.screen-panel {
  background: #24283b;
  border-radius: 10px;
  padding: 16px;
  border: 1px solid #2f3549;
  margin-top: 16px;
}

.screen-panel h2 { color: #7aa2f7; font-size: 14px; margin-bottom: 12px; }

#screen-preview {
  background: #1a1b26;
  border: 2px solid #414868;
  border-radius: 6px;
  height: 200px;
  position: relative;
  overflow: hidden;
}

.win {
  position: absolute;
  border: 2px solid #414868;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: all 0.2s ease;
  overflow: hidden;
}

.win.focused { border-color: #7aa2f7; background: rgba(122,162,247,0.1); }
.win:not(.focused) { background: rgba(36,40,59,0.8); }
.win .win-name { color: #c0caf5; }

.tab-bar-preview {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 18px;
  display: flex;
  font-size: 9px;
  gap: 1px;
}

.tab-bar-preview .tab-item {
  padding: 2px 8px;
  background: #24283b;
  color: #565f89;
  flex: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
}

.tab-bar-preview .tab-item.active {
  background: #7aa2f7;
  color: #1a1b26;
}

/* Side panel */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Commands */
.cmd-panel {
  background: #24283b;
  border-radius: 10px;
  padding: 16px;
  border: 1px solid #2f3549;
}

.cmd-panel h2 { color: #e0af68; font-size: 14px; margin-bottom: 12px; }

.cmd-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.cmd-btn {
  background: #1a1b26;
  border: 1px solid #2f3549;
  border-radius: 6px;
  padding: 8px 10px;
  color: #c0caf5;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}

.cmd-btn:hover { border-color: #7aa2f7; background: #1a2030; }
.cmd-btn:active { transform: scale(0.97); }
.cmd-btn .key { color: #7aa2f7; font-weight: bold; display: block; font-size: 12px; }
.cmd-btn .desc { color: #565f89; font-size: 10px; }

.cmd-section { font-size: 11px; color: #565f89; padding: 6px 0 2px; grid-column: 1 / -1; border-top: 1px solid #2f3549; margin-top: 4px; }
.cmd-section:first-child { border-top: none; margin-top: 0; }

/* Exercise panel (in sidebar) */
.exercise-panel h2 { color: #9ece6a; font-size: 13px; margin-bottom: 10px; }

#exercise-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ex-item {
  padding: 6px 10px;
  background: #1a1b26;
  border: 1px solid #2f3549;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ex-item:hover { border-color: #7aa2f7; }
.ex-item.active { border-color: #9ece6a; background: rgba(158,206,106,0.05); }
.ex-item.completed { opacity: 0.5; }
.ex-item .ex-num { color: #7aa2f7; font-weight: bold; min-width: 20px; }
.ex-item .ex-name { color: #c0caf5; }
.ex-item .ex-check { color: #9ece6a; margin-left: auto; }

/* Goal display */
.goal-panel {
  background: #24283b;
  border-radius: 10px;
  padding: 16px;
  border: 1px solid #2f3549;
}

.goal-panel h2 { color: #bb9af7; font-size: 14px; margin-bottom: 8px; }
.goal-panel .goal-desc { color: #565f89; font-size: 12px; margin-bottom: 10px; line-height: 1.5; }

#goal-tree {
  font-size: 12px;
  line-height: 1.5;
  white-space: pre;
  background: #1a1b26;
  padding: 10px;
  border-radius: 6px;
  color: #565f89;
}


/* Status */
.status-bar {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  font-weight: 600;
  transition: all 0.3s;
}

.status-bar.working { background: #24283b; color: #565f89; border: 1px solid #2f3549; }
.status-bar.success { background: rgba(158,206,106,0.1); color: #9ece6a; border: 1px solid #9ece6a; }
.status-bar.hint { background: rgba(224,175,104,0.1); color: #e0af68; border: 1px solid #e0af68; }

/* History */
.history-panel {
  margin-top: 16px;
  background: #24283b;
  border-radius: 10px;
  padding: 12px 16px;
  border: 1px solid #2f3549;
}

.history-panel h2 {
  color: #565f89;
  font-size: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.history-panel .step-count { color: #414868; font-weight: normal; }

.history-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.history-item {
  background: #1a1b26;
  border: 1px solid #2f3549;
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 11px;
  color: #7aa2f7;
  white-space: nowrap;
}

.history-item .desc { color: #565f89; margin-left: 4px; }
</style>
</head>
<body>

<div class="app">
  <button class="sidebar-toggle shifted" id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>

  <div class="sidebar" id="sidebar">
    <h1>i3 Practice</h1>
    <span class="subtitle">Match the goal tree to complete each exercise.</span>
    <div class="exercise-panel">
      <h2>Exercises</h2>
      <div id="exercise-list"></div>
    </div>
  </div>

  <div class="content">
    <div class="main">
      <div>
        <div id="status" class="status-bar working">Select an exercise to begin</div>
        <div class="tree-panel" style="margin-top: 16px;">
          <h2>Container Tree <span style="color:#565f89;font-weight:normal;font-size:11px;">(i3tree)</span></h2>
          <div id="tree-view"></div>
        </div>
        <div class="screen-panel">
          <h2>Screen Preview</h2>
          <div id="screen-preview"></div>
        </div>
        <div class="history-panel">
          <h2>Steps <span id="step-count" class="step-count"></span></h2>
          <div id="history" class="history-list"></div>
        </div>
      </div>

      <div class="side-panel">
        <div class="goal-panel">
          <h2>Goal</h2>
          <div id="goal-desc" class="goal-desc">Select an exercise from the sidebar.</div>
          <div id="goal-tree"></div>
        </div>

        <div class="cmd-panel">
          <h2>Commands</h2>
          <div class="cmd-grid">
            <div class="cmd-section">Open / Close</div>
            <button class="cmd-btn" onclick="cmd('open')"><span class="key">$mod+Return</span><span class="desc">Open terminal</span></button>
            <button class="cmd-btn" onclick="cmd('close')"><span class="key">$mod+Shift+q</span><span class="desc">Close window</span></button>

            <div class="cmd-section">Focus</div>
            <button class="cmd-btn" onclick="cmd('focus_left')"><span class="key">$mod+h</span><span class="desc">Focus left</span></button>
            <button class="cmd-btn" onclick="cmd('focus_right')"><span class="key">$mod+l</span><span class="desc">Focus right</span></button>
            <button class="cmd-btn" onclick="cmd('focus_up')"><span class="key">$mod+k</span><span class="desc">Focus up</span></button>
            <button class="cmd-btn" onclick="cmd('focus_down')"><span class="key">$mod+j</span><span class="desc">Focus down</span></button>

            <div class="cmd-section">Split direction (next window)</div>
            <button class="cmd-btn" onclick="cmd('split_h')"><span class="key">$mod+b</span><span class="desc">Next window right</span></button>
            <button class="cmd-btn" onclick="cmd('split_v')"><span class="key">$mod+v</span><span class="desc">Next window below</span></button>

            <div class="cmd-section">Parent / Child</div>
            <button class="cmd-btn" onclick="cmd('focus_parent')"><span class="key">$mod+a</span><span class="desc">Focus parent</span></button>
            <button class="cmd-btn" onclick="cmd('focus_child')"><span class="key">$mod+z</span><span class="desc">Focus child</span></button>

            <div class="cmd-section">Layout (existing siblings)</div>
            <button class="cmd-btn" onclick="cmd('layout_toggle')"><span class="key">$mod+e</span><span class="desc">Toggle H/V</span></button>
            <button class="cmd-btn" onclick="cmd('layout_tabbed')"><span class="key">$mod+w</span><span class="desc">Tabbed</span></button>
            <button class="cmd-btn" onclick="cmd('layout_stacked')"><span class="key">$mod+s</span><span class="desc">Stacked</span></button>

            <div class="cmd-section">Tools</div>
            <button class="cmd-btn" onclick="cmd('flatten')"><span class="key">$mod+Shift+f</span><span class="desc">Flatten</span></button>
            <button class="cmd-btn" onclick="cmd('reset')"><span class="key">Reset</span><span class="desc">Start over</span></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Sidebar toggle ─────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  sidebar.classList.toggle('collapsed');
  btn.classList.toggle('shifted');
}

// ── i3 Tree Simulator ──────────────────────────────
let nextId = 1;
let terminalCount = 0;
let tree = null;
let currentExercise = null;
let history = [];
let focusedContainer = null; // When $mod+a is used, this holds the focused container

function makeNode(layout, name) {
  return { id: nextId++, layout, name: name || null, children: [], focused: false, splitDir: 'h' };
}

function makeWorkspace() {
  terminalCount = 0;
  const ws = makeNode('splith');
  ws.isWorkspace = true;
  ws.name = 'WS 9';
  return ws;
}

function findFocusedNode(node) {
  // Returns the focused node — either a leaf or a container if $mod+a was used
  if (focusedContainer) return focusedContainer;
  return findFocused(node);
}

function findFocused(node) {
  if (node.focused && !node.children.length) return node;
  for (const c of node.children) {
    const f = findFocused(c);
    if (f) return f;
  }
  return null;
}

function findParent(root, target) {
  for (const c of root.children) {
    if (c.id === target.id) return root;
    const p = findParent(c, target);
    if (p) return p;
  }
  return null;
}

function getAllLeaves(node) {
  if (!node.children.length && node.name && !node.isWorkspace) return [node];
  let leaves = [];
  for (const c of node.children) leaves.push(...getAllLeaves(c));
  return leaves;
}

function clearFocus(node) {
  node.focused = false;
  node.children.forEach(c => clearFocus(c));
}

function setFocus(node) {
  clearFocus(tree);
  node.focused = true;
}

function getLeafIndex(parent, leaf) {
  const leaves = getAllLeaves(parent);
  return leaves.findIndex(l => l.id === leaf.id);
}

// ── Commands ────────────────────────────────────────
function cmd(action) {
  const focused = findFocused(tree);

  switch(action) {
    case 'open': {
      terminalCount++;
      const newWin = makeNode('splith', 'bash ' + terminalCount);
      newWin.focused = true;

      if (!tree.children.length) {
        clearFocus(tree);
        tree.children.push(newWin);
      } else if (focused) {
        const parent = findParent(tree, focused);
        if (!parent) break;
        clearFocus(tree);

        if (focused.splitDir === 'v') {
          // Create a splitv container wrapping focused + new
          const container = makeNode('splitv');
          const idx = parent.children.indexOf(focused);
          focused.splitDir = 'h';
          parent.children.splice(idx, 1, container);
          container.children.push(focused, newWin);
        } else if (focused.splitDir === 'h') {
          const idx = parent.children.indexOf(focused);
          if (parent.layout === 'tabbed' || parent.layout === 'stacked') {
            parent.children.push(newWin);
          } else {
            parent.children.splice(idx + 1, 0, newWin);
          }
        }
      }
      addHistory('$mod+Return', 'Open terminal');
      break;
    }

    case 'close': {
      if (!focused) break;
      const parent = findParent(tree, focused);
      if (!parent) break;
      parent.children = parent.children.filter(c => c.id !== focused.id);

      // If container has 1 child, unwrap it
      if (parent.children.length === 1 && !parent.isWorkspace) {
        const grandparent = findParent(tree, parent);
        if (grandparent) {
          const idx = grandparent.children.indexOf(parent);
          grandparent.children.splice(idx, 1, parent.children[0]);
        }
      }

      // Focus something
      const leaves = getAllLeaves(tree);
      if (leaves.length > 0) {
        clearFocus(tree);
        leaves[leaves.length - 1].focused = true;
      }
      addHistory('$mod+Shift+q', 'Close window');
      break;
    }

    case 'split_v': {
      if (focused) focused.splitDir = 'v';
      addHistory('$mod+v', 'Set vertical split');
      break;
    }

    case 'split_h': {
      if (focused) focused.splitDir = 'h';
      addHistory('$mod+b', 'Set horizontal split');
      break;
    }

    case 'focus_parent': {
      if (!focused) break;
      const parent = findParent(tree, focused);
      if (!parent) break;
      focusedContainer = parent;
      addHistory('$mod+a', 'Focus parent');
      break;
    }

    case 'focus_child': {
      if (focusedContainer) {
        focusedContainer = null;
        addHistory('$mod+z', 'Focus child');
      }
      break;
    }

    case 'layout_toggle': {
      // Find the target: if focusedContainer is set, operate on its parent
      const node = focusedContainer || focused;
      if (!node) break;
      const target = findParent(tree, node);
      if (!target) break;
      if (target.layout === 'splith') target.layout = 'splitv';
      else target.layout = 'splith';
      target.children.forEach(c => { if (!c.children.length) c.layout = target.layout; });
      focusedContainer = null;
      addHistory('$mod+e', 'Toggle split');
      checkHint();
      break;
    }

    case 'layout_tabbed': {
      const node = focusedContainer || focused;
      if (!node) break;
      const target = findParent(tree, node);
      if (!target) break;
      target.layout = 'tabbed';
      target.children.forEach(c => { if (!c.children.length) c.layout = 'tabbed'; });
      focusedContainer = null;
      addHistory('$mod+w', 'Layout tabbed');
      checkHint();
      break;
    }

    case 'layout_stacked': {
      const node = focusedContainer || focused;
      if (!node) break;
      const target = findParent(tree, node);
      if (!target) break;
      target.layout = 'stacked';
      target.children.forEach(c => { if (!c.children.length) c.layout = 'stacked'; });
      focusedContainer = null;
      addHistory('$mod+s', 'Layout stacked');
      checkHint();
      break;
    }

    case 'focus_left':
    case 'focus_right':
    case 'focus_up':
    case 'focus_down': {
      if (!focused) break;
      focusedContainer = null;
      const parent = findParent(tree, focused);
      if (!parent) break;
      const siblings = parent.children;
      const idx = siblings.indexOf(focused);
      let nextIdx = idx;

      if (action === 'focus_left' || action === 'focus_up') {
        nextIdx = Math.max(0, idx - 1);
      } else {
        nextIdx = Math.min(siblings.length - 1, idx + 1);
      }

      const target = siblings[nextIdx];
      const leaves = getAllLeaves(target);
      if (leaves.length > 0) {
        clearFocus(tree);
        leaves[0].focused = true;
      }

      const dirs = { focus_left: '$mod+h', focus_right: '$mod+l', focus_up: '$mod+k', focus_down: '$mod+j' };
      addHistory(dirs[action], 'Focus ' + action.split('_')[1]);
      break;
    }

    case 'flatten': {
      const leaves = getAllLeaves(tree);
      tree.children = leaves;
      tree.layout = 'splith';
      if (leaves.length > 0) {
        clearFocus(tree);
        leaves[0].focused = true;
      }
      focusedContainer = null;
      addHistory('$mod+Shift+f', 'Flatten');
      break;
    }

    case 'reset': {
      focusedContainer = null;
      if (currentExercise) loadExercise(currentExercise);
      else { tree = makeWorkspace(); }
      history = [];
      document.getElementById('history').innerHTML = '';
      document.getElementById('step-count').textContent = '';
      break;
    }
  }

  render();
  checkGoal();
}

// ── Hint system ─────────────────────────────────────
function checkHint() {
  if (currentExercise === null) return;
  const ex = exercises[currentExercise];
  if (ex.hint && ex.hint()) {
    const statusEl = document.getElementById('status');
    statusEl.className = 'status-bar hint';
    statusEl.innerHTML = ex.hintText || 'Something went wrong. Press Reset to try again.';
  }
}

// ── Render tree text ────────────────────────────────
function renderTreeText(node, indent) {
  let lines = [];
  const layoutClass = node.isWorkspace ? 'node-ws' : 'node-layout';
  const prefix = '  '.repeat(indent);

  const isContainerFocused = focusedContainer && focusedContainer.id === node.id;
  const containerMarker = isContainerFocused ? ' <span class="node-focused">&lt;-- parent focus</span>' : '';

  if (node.isWorkspace) {
    lines.push(`<span class="node-ws">${node.name} [${node.layout}]</span>${containerMarker}`);
  } else if (node.children.length > 0) {
    lines.push(`<span class="node-branch">${prefix}</span><span class="node-layout">[${node.layout}]</span>${containerMarker}`);
  } else if (node.name) {
    const cls = node.focused ? 'node-focused' : 'node-window';
    const marker = node.focused ? ' <--' : '';
    lines.push(`<span class="node-branch">${prefix}</span><span class="${cls}">[${node.layout}] ${node.name}${marker}</span>`);
  }

  for (const c of node.children) {
    lines.push(...renderTreeText(c, indent + 1));
  }
  return lines;
}

// ── Render screen preview ───────────────────────────
function renderScreen(node, x, y, w, h, container) {
  if (!node.children.length && node.name) {
    // Leaf window
    const div = document.createElement('div');
    div.className = 'win' + (node.focused ? ' focused' : '');
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.width = Math.max(w - 4, 10) + 'px';
    div.style.height = Math.max(h - 4, 10) + 'px';
    div.innerHTML = `<span class="win-name">${node.name}</span>`;
    container.appendChild(div);
    return;
  }

  if (node.layout === 'tabbed' || node.layout === 'stacked') {
    // Draw tab bar
    const tabH = 18;
    const barDiv = document.createElement('div');
    barDiv.className = 'tab-bar-preview';
    barDiv.style.left = x + 'px';
    barDiv.style.top = y + 'px';
    barDiv.style.width = w + 'px';

    const focusedLeaf = findFocused(node);
    let activeChild = null;

    for (const c of node.children) {
      const tab = document.createElement('div');
      const leaves = getAllLeaves(c);
      const isActive = leaves.some(l => l.focused);
      if (isActive) activeChild = c;
      tab.className = 'tab-item' + (isActive ? ' active' : '');
      tab.textContent = (c.name || (leaves[0] && leaves[0].name) || '?');
      barDiv.appendChild(tab);
    }
    container.appendChild(barDiv);

    // Draw active child content
    if (activeChild) {
      renderScreen(activeChild, x, y + tabH, w, h - tabH, container);
    } else if (node.children.length > 0) {
      renderScreen(node.children[0], x, y + tabH, w, h - tabH, container);
    }
    return;
  }

  // Split layout
  const isH = node.layout === 'splith';
  const count = node.children.length;
  if (count === 0) return;

  node.children.forEach((c, i) => {
    if (isH) {
      const cw = w / count;
      renderScreen(c, x + i * cw, y, cw, h, container);
    } else {
      const ch = h / count;
      renderScreen(c, x, y + i * ch, w, ch, container);
    }
  });
}

// ── Render ──────────────────────────────────────────
function render() {
  // Tree text
  const treeEl = document.getElementById('tree-view');
  const lines = renderTreeText(tree, 0);
  treeEl.innerHTML = lines.join('\n');

  // Screen preview
  const preview = document.getElementById('screen-preview');
  preview.innerHTML = '';
  const rect = preview.getBoundingClientRect();
  renderScreen(tree, 2, 2, rect.width - 4, rect.height - 4, preview);
}

// ── History ─────────────────────────────────────────
function addHistory(key, desc) {
  history.push({ key, desc });
  const el = document.getElementById('history');
  const chip = document.createElement('span');
  chip.className = 'history-item';
  chip.innerHTML = `${key}<span class="desc">${desc}</span>`;
  el.appendChild(chip);
  document.getElementById('step-count').textContent = `(${history.length})`;
}

function loadExercise(idx) {
  currentExercise = idx;
  focusedContainer = null;
  const ex = exercises[idx];
  ex.setup();
  history = [];
  document.getElementById('history').innerHTML = '';
  document.getElementById('step-count').textContent = '';
  document.getElementById('goal-desc').textContent = ex.desc;
  document.getElementById('status').className = 'status-bar working';
  document.getElementById('status').textContent = ex.name;

  // Build goal tree text
  const goalTreeEl = document.getElementById('goal-tree');
  goalTreeEl.textContent = ex.goal || '';
  goalTreeEl.style.display = ex.goal ? 'block' : 'none';

  // Update exercise list
  document.querySelectorAll('.ex-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  render();
}

function checkGoal() {
  if (currentExercise === null) return;
  const ex = exercises[currentExercise];
  if (ex.check()) {
    document.getElementById('status').className = 'status-bar success';
    const steps = history.length;
    const statusEl = document.getElementById('status');
    statusEl.className = 'status-bar success';
    statusEl.innerHTML = `<strong>${exercises[currentExercise].name} — Completed in ${steps} step${steps !== 1 ? 's' : ''}!</strong>`;
    const lessonHtml = (exercises[currentExercise].lesson || '').replace(/\n\n/g, '<br><br>').replace(/\n•/g, '<br>•');
    document.getElementById('goal-desc').innerHTML = lessonHtml;
    document.getElementById('goal-tree').style.display = 'none';
    document.querySelectorAll('.ex-item')[currentExercise].classList.add('completed');
    document.querySelectorAll('.ex-item')[currentExercise].querySelector('.ex-check').textContent = '✓';
  }
}

function init() {
  tree = makeWorkspace();

  // Build exercise list
  const list = document.getElementById('exercise-list');
  exercises.forEach((ex, i) => {
    const div = document.createElement('div');
    div.className = 'ex-item';
    div.innerHTML = `<span class="ex-name">${ex.name}</span><span class="ex-check"></span>`;
    div.onclick = () => loadExercise(i);
    list.appendChild(div);
  });

  render();
}

init();
</script>

</body>
